<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="./css/style.css">
   <title>Online Calculator</title>
   </head>
<body>
   <header>
      <h1>Online Calculator</h1>
   </header>
   <main>
      <div class="calculator">
         <div class="numbers">
            <button type="button" class="operandos" value="9">9</button>
            <button type="button" class="operandos" value="8">8</button>
            <button type="button" class="operandos" value="7">7</button>
            <button type="button" class="operandos" value="6">6</button>
            <button type="button" class="operandos" value="5">5</button>
            <button type="button" class="operandos" value="4">4</button>
            <button type="button" class="operandos" value="3">3</button>
            <button type="button" class="operandos" value="2">2</button>
            <button type="button" class="operandos" value="1">1</button>
            <button type="button" class="operandos" value="0">0</button>
         </div>
         <div class="operators">
            <button type="button" class="operadores" value="+">+</button>
            <button type="button" class="operadores" value="-">-</button>
            <button type="button" class="operadores" value="/">/</button>
            <button type="button" class="operadores" value="*">*</button>
            <button type="button" class="operadores" value="clear">Clear</button>
            <button type="button" id="equals">=</button>
         </div>
      </div>
   </main>
<script src="./js/script.js"></script>
</body>
</html>
